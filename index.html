<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Chemical Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --up:#DC2626; --dn:#1D4ED8; --flt:#111827;
  --up-bg:#FEF2F2; --dn-bg:#EFF6FF; --flt-bg:#F9FAFB;
  --lotte:#E31837; --g1:#111827; --g2:#374151; --g3:#6B7280; --g4:#9CA3AF;
  --g6:#F3F4F6; --g7:#F9FAFB; --white:#FFFFFF;
  --bd:#E5E7EB; --sh:0 4px 12px rgba(0,0,0,0.08);
  --sans:'Noto Sans KR',sans-serif; --disp:'Montserrat',sans-serif; --mono:'DM Mono',monospace;
  --highlight-bg:#FFEB3B; --brand-orange:#FF9800;
  --wti:#DC2626; --sm:#7C3AED; --bz:#0369A1; --bd2:#047857;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--g7);color:var(--g1);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* в”Җв”Җ н—ӨлҚ” в”Җв”Җ */
.hdr{background:var(--white);border-bottom:3px solid var(--lotte);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.hdr-inner{max-width:1600px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:20px;}
.hdr-brand{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.hdr-mark{width:50px;height:38px;background:var(--brand-orange);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-size:14px;font-weight:900;color:#000;border:2px solid #000;}
.hdr-title{font-family:var(--disp);font-size:18px;font-weight:900;color:#000;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px;}
.hdr-title span{color:var(--lotte);}
.hdr-title span.copyright-text{color:#000 !important;}
.copyright-text{font-family:var(--sans);font-size:13px;font-weight:800;color:#000;margin-left:14px;border-left:2.5px solid #000;padding-left:14px;white-space:nowrap;}
.hdr-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;}
.hdr-date-nav{display:flex;align-items:center;gap:6px;background:#f3f4f6;border-radius:8px;padding:6px 12px;border:1px solid var(--bd);}
.hdr-date-lbl{font-family:var(--mono);font-size:16px;font-weight:700;min-width:105px;text-align:center;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* в”Җв”Җ лІ„нҠј в”Җв”Җ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;border:1px solid transparent;white-space:nowrap;}
.btn-primary{background:var(--lotte);color:#fff;}
.btn-outline{background:var(--white);color:var(--g2);border:1px solid var(--bd);}
.btn-primary:hover{background:#c41230;}
.btn-outline:hover{background:var(--g6);}

/* в”Җв”Җ л Ҳмқҙм•„мӣғ в”Җв”Җ */
.layout{max-width:1600px;margin:0 auto;padding:24px 32px 80px;display:flex;gap:20px;}
.sidebar{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;}
.mini-wk-wrap{background:var(--white);border:1px solid var(--bd);border-radius:10px;padding:10px 8px;margin-top:4px;}
.mini-wk-title{font-size:10px;font-weight:800;color:var(--g3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.mini-wk-table{width:100%;border-collapse:collapse;font-size:10px;}
.mini-wk-table th{font-size:9px;color:var(--g4);background:var(--g7);padding:3px 4px;text-align:center;border-bottom:1px solid var(--bd);font-weight:600;white-space:nowrap;}
.mini-wk-table th:first-child{text-align:left;}
.mini-wk-table td{padding:3px 4px;text-align:center;border-bottom:1px solid var(--g6);font-family:var(--mono);font-size:9px;color:var(--g2);white-space:nowrap;}
.mini-wk-table td:first-child{text-align:left;font-weight:700;font-size:9px;color:var(--g1);}
.mini-wk-table td.wt-up{color:var(--up)!important;font-weight:700;}
.mini-wk-table td.wt-dn{color:var(--dn)!important;font-weight:700;}
.mini-wk-table td.wt-flt{color:var(--flt)!important;font-weight:700;}
.main{flex:1;min-width:0;display:flex;flex-direction:column;gap:18px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* в”Җв”Җ м•„м№ҙмқҙлёҢ л“ңлЎӯлӢӨмҡҙ в”Җв”Җ */
.arc-select-wrap{position:relative;width:100%;}
.arc-select-btn{width:100%;padding:12px 15px;background:var(--white);border:2px solid #000;border-radius:8px;font-family:var(--mono);font-size:14px;font-weight:700;color:#000;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--sh);}
.arc-select-btn:hover{background:var(--g6);}
.arc-select-btn::after{content:'в–ј';font-size:10px;margin-left:10px;}
.arc-dropdown{position:absolute;top:100%;left:0;width:100%;max-height:350px;overflow-y:auto;background:var(--white);border:2px solid #000;border-top:none;border-radius:0 0 8px 8px;z-index:100;display:none;box-shadow:0 10px 25px rgba(0,0,0,0.15);}
.arc-dropdown.show{display:block;}
.arc-item{padding:11px 15px;font-family:var(--mono);font-size:13px;color:var(--g2);cursor:pointer;border-bottom:1px solid var(--g6);display:flex;justify-content:space-between;align-items:center;}
.arc-item:hover{background:#FFF9C4;color:#000;font-weight:700;}
.arc-item.active{background:#FEF2F2;color:var(--lotte);font-weight:800;}

/* в”Җв”Җ м№ҙл“ң в”Җв”Җ */
.p-card{background:var(--white);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:var(--sh);display:flex;flex-direction:column;}
.card-bar{height:6px;}
.card-bar.wti{background:var(--wti);}
.card-bar.sm{background:var(--sm);}
.card-bar.bz{background:var(--bz);}
.card-bar.bd{background:var(--bd2);}
.card-hdr{padding:16px 18px 10px;display:flex;justify-content:space-between;align-items:center;}
.card-prod{font-family:var(--disp);font-size:22px;font-weight:900;}
.card-prod.wti{color:var(--wti);}
.card-prod.sm{color:var(--sm);}
.card-prod.bz{color:var(--bz);}
.card-prod.bd{color:var(--bd2);}
.card-price{padding:0 18px 10px;display:flex;align-items:baseline;justify-content:space-between;}
.p-val{font-family:var(--disp);font-size:46px;font-weight:900;line-height:1;}
.p-val.up{color:var(--up);}.p-val.dn{color:var(--dn);}.p-val.flt{color:var(--flt);}
.d-abs{font-family:var(--mono);font-size:18px;font-weight:700;}
.d-abs.up{color:var(--up);}.d-abs.dn{color:var(--dn);}.d-abs.flt{color:var(--flt);}
.dir-badge{display:inline-block;padding:6px 16px;border-radius:30px;font-size:15px;font-weight:900;border:2px solid black;margin-bottom:15px;margin-left:18px;}
.dir-badge.up{background:var(--up);color:white;}
.dir-badge.dn{background:var(--dn);color:white;}
.dir-badge.flt{background:var(--g3);color:white;}

/* в”Җв”Җ м„№м…ҳ л Ҳмқҙлё” л°•мҠӨ в”Җв”Җ */
.section-label-box{display:inline-block;background-color:var(--highlight-bg);border:2px solid #000;padding:4px 12px;margin:15px 18px 8px;border-radius:4px;}
.section-label-text{font-family:var(--mono);font-size:13px;font-weight:900;color:#000;text-transform:uppercase;}
.section-body-text{padding:0 18px 14px;font-size:15px;line-height:1.7;color:#000;word-break:keep-all;}
.text-bold{font-weight:800;}
.no-data{padding:40px;text-align:center;color:#999;font-size:13px;}

/* в”Җв”Җ мЈјк°„ н…Ңмқҙлё” в”Җв”Җ */
.wk-wrap{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:20px;box-shadow:var(--sh);}
.wk-title{font-family:var(--sans);font-size:16px;font-weight:900;letter-spacing:.02em;color:var(--g1);margin-bottom:14px;}
.wk-table{width:100%;border-collapse:collapse;font-size:13px;}
.wk-table th{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--g4);background:var(--g7);padding:8px 14px;text-align:right;font-weight:500;border-bottom:1px solid var(--bd);}
.wk-table th:first-child{text-align:left;}
.wk-table td{padding:9px 14px;text-align:right;border-bottom:1px solid var(--g6);font-family:var(--mono);font-size:12px;color:var(--g2);}
.wk-table td:first-child{text-align:left;font-weight:700;font-family:var(--sans);font-size:13px;}
.wk-table td.wt-up{color:var(--up)!important;font-weight:700;}
.wk-table td.wt-dn{color:var(--dn)!important;font-weight:700;}
.wk-table td.wt-flt{color:var(--flt)!important;font-weight:700;}

/* в”Җв”Җ лӘЁлӢ¬ в”Җв”Җ */
#overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}
#overlay.open{display:flex;}
#modal{width:880px;max-width:96vw;max-height:94vh;background:var(--white);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;}
.m-tab{flex:1;padding:15px;border:none;background:none;cursor:pointer;font-weight:800;font-size:14px;border-bottom:3px solid transparent;transition:all .15s;}
.m-tab.active{border-bottom:3px solid var(--lotte);color:var(--lotte);}
.pfield{margin-bottom:12px;}
.pfield label{display:block;font-size:12px;font-weight:700;margin-bottom:4px;color:var(--g2);}
.pfield input,.pfield select,.pfield textarea{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:var(--sans);outline:none;color:var(--g1);background:var(--white);}
.pfield input:focus,.pfield select:focus,.pfield textarea:focus{border-color:var(--lotte);}
.pfield textarea{resize:vertical;line-height:1.65;}
.m-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.m-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.parse-status{padding:8px 14px;border-radius:6px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;}
.parse-status.ok{display:block;background:#D1FAE5;color:#065F46;}
.parse-status.warn{display:block;background:#FEF3C7;color:#92400E;}
.parse-status.err{display:block;background:#FEE2E2;color:#991B1B;}

/* в”Җв”Җ нҶ мҠӨнҠё в”Җв”Җ */
#toast{position:fixed;bottom:30px;right:30px;z-index:9999;padding:15px 25px;border-radius:10px;font-weight:700;color:#fff;opacity:0;transition:0.3s;box-shadow:var(--sh);}
#toast.show{opacity:1;}

/* в”Җв”Җ н”„лҰ°нҠё/PDF в”Җв”Җ */
@media print{
  body{background:#fff;}
  .hdr{position:static;box-shadow:none;}
  .hdr-right,.sidebar,.wk-wrap{display:none;}
  .layout{padding:10px;flex-direction:row;}
  .main{width:100%;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;}
  .p-card{break-inside:avoid;page-break-inside:avoid;}
  .p-val{font-size:28px;}
  .d-abs{font-size:12px;}
  .section-body-text{font-size:11px;}
  .card-prod{font-size:16px;}
  .section-label-box{padding:2px 8px;margin:8px 10px 4px;}
  .section-label-text{font-size:10px;}
  .dir-badge{font-size:11px;padding:3px 10px;}
}

/* в”Җв”Җ л°ҳмқ‘нҳ• в”Җв”Җ */
@media(max-width:480px){
  .hdr-inner{height:auto;flex-direction:column;padding:15px 16px;gap:15px;}
  .copyright-text{display:block;border-left:none;padding-left:0;margin-left:0;margin-top:5px;font-size:11px;text-align:center;}
  .hdr-right{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .layout{padding:16px 12px;flex-direction:column;}
  .sidebar{width:100%;}
  .grid4{grid-template-columns:1fr;}
  .p-val{font-size:32px;}
  .d-abs{font-size:13px;}
  .card-price{flex-wrap:wrap;gap:4px;}
}
@media(min-width:481px) and (max-width:1024px){
  .grid4{grid-template-columns:1fr 1fr;}
  .layout{padding:20px 20px;}
  .sidebar{width:200px;}
}
@media(min-width:768px) and (max-width:1024px){
  .hdr-inner{padding:0 16px;height:56px;}
  .hdr-title{font-size:15px;}
  .copyright-text{font-size:11px;}
  .layout{padding:16px 16px 60px;flex-direction:column;gap:14px;}
  .sidebar{width:100%;flex-direction:row;align-items:center;gap:12px;}
  .arc-select-wrap{max-width:280px;}
  .grid4{grid-template-columns:repeat(2,1fr);gap:14px;}
  .p-val{font-size:38px;}
  .card-prod{font-size:20px;}
  .section-body-text{font-size:14px;}
  .wk-wrap{overflow-x:auto;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="hdr-mark">LAM</div>
      <div class="hdr-title">Daily <span>Chemical</span> Brief
        <span class="copyright-text">created by JSKIM of LAM (мІЁлӢЁкө¬л§Ө1нҢҖ)</span>
      </div>
    </div>
    <div class="hdr-center">
      <div class="hdr-date-nav">
        <button onclick="moveDate(1)" style="background:none;border:none;cursor:pointer;font-size:24px;">&#8249;</button>
        <div class="hdr-date-lbl" id="hdr-date-lbl">вҖ”</div>
        <button onclick="moveDate(-1)" style="background:none;border:none;cursor:pointer;font-size:24px;">&#8250;</button>
      </div>
    </div>
    <div class="hdr-right">
      <button class="btn btn-outline" onclick="loadData()">вҶә мғҲлЎңкі м№Ё</button>
      <button class="btn btn-primary" onclick="openModal()">+ NEW ENTRY</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="arc-select-wrap">
      <div style="font-size:11px;font-weight:800;color:var(--g3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Archive</div>
      <button class="arc-select-btn" id="arc-selected-label" onclick="toggleArc()">лӮ м§ң м„ нғқ</button>
      <div class="arc-dropdown" id="arc-dropdown"></div>
    </div>
    <div class="mini-wk-wrap">
      <div class="mini-wk-title">рҹ“Ҡ мЈјк°„ мҡ”м•Ҫ <span id="mini-wk-label" style="font-size:9px;color:#6b7280;"></span></div>
      <table class="mini-wk-table"><thead><tr id="mini-wk-thead"></tr></thead><tbody id="mini-wk-tbody"></tbody></table>
    </div>
  </aside>

  <main class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div style="font-family:var(--disp);font-size:28px;font-weight:900;" id="main-date">вҖ”</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-outline" onclick="dlImage()">рҹ“· мқҙлҜём§Җ</button>
        <button class="btn btn-outline" onclick="window.print()">рҹ–Ё PDF</button>
        <button class="btn btn-outline" onclick="copyMsg()">рҹ’¬ л©”мӢ м Җ</button>
      </div>
    </div>
    <div class="grid4" id="grid"></div>
    <div class="wk-wrap">
      <div class="wk-title">рҹ“Ҡ мЈјк°„ к°ҖкІ© мҡ”м•Ҫ <span id="wk-label" style="font-size:11px;color:#6b7280;margin-left:8px;"></span></div>
      <table class="wk-table"><thead><tr id="wk-thead"></tr></thead><tbody id="wk-tbody"></tbody></table>
    </div>
  </main>
</div>

<div id="overlay">
  <div id="modal">
    <div style="padding:20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;background:#f9fafb;">
      <div style="font-weight:900;font-size:18px;" id="modal-title">NEW BRIEFING ENTRY</div>
      <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;font-size:28px;">&times;</button>
    </div>
    <div style="display:flex;border-bottom:1px solid #eee;overflow-x:auto;" id="tab-bar"></div>
    <div id="tab-panels" style="flex:1;overflow-y:auto;padding:22px;"></div>
    <div style="padding:15px 22px;background:#f9fafb;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:10px;">
      <button class="btn btn-outline" onclick="doParse()">рҹ”Қ нҢҢмӢұ мӢӨн–ү</button>
      <button class="btn btn-primary" onclick="doSaveAll()">в–¶ м „мІҙ м ҖмһҘ</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbzqOZB4bllYuEKqi3K70MPAfVODnzJxbt6Hmkbpo1CvxodK12bK6B1X6bKPCGWbY57p/exec';

const PRODS=['WTI','Styrene','Benzene','Butadiene'];
const PCLS={WTI:'wti',Styrene:'sm',Benzene:'bz',Butadiene:'bd'};
const UNITS={WTI:'$/bbl',Styrene:'$/MT',Benzene:'$/MT',Butadiene:'$/MT'};
const LABELS={WTI:'WTI Crude Oil',Styrene:'Styrene Monomer',Benzene:'Benzene',Butadiene:'Butadiene'};
let allData={}, allDates=[], curDate='', activeTab='WTI', editMode={}, tabDone={};

// в”Җв”Җ кҙҖлҰ¬мһҗ мІҙнҒ¬ в”Җв”Җ
function checkAdmin(){
  const pw=prompt("кҙҖлҰ¬мһҗ л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҳм„ёмҡ”:");
  if(pw==="0111")return true;
  if(pw!==null)alert("л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ.");
  return false;
}

// в”Җв”Җ м•„м№ҙмқҙлёҢ л“ңлЎӯлӢӨмҡҙ в”Җв”Җ
function toggleArc(){document.getElementById('arc-dropdown').classList.toggle('show');}
window.addEventListener('click',function(e){
  if(!e.target.matches('.arc-select-btn'))document.getElementById('arc-dropdown').classList.remove('show');
});
function buildArc(){
  document.getElementById('arc-dropdown').innerHTML=allDates.map(d=>
    `<div class="arc-item${d===curDate?' active':''}" onclick="selDate('${d}')">${d}</div>`
  ).join('');
}

// в”Җв”Җ лӮ м§ң мқҙлҸҷ в”Җв”Җ
function moveDate(offset){
  const idx=allDates.indexOf(curDate);
  const next=allDates[idx+offset];
  if(next)selDate(next);
}
function selDate(d){
  curDate=d;
  document.getElementById('hdr-date-lbl').textContent=d;
  document.getElementById('main-date').textContent=d;
  document.getElementById('arc-selected-label').textContent=d;
  document.getElementById('arc-dropdown').classList.remove('show');
  document.getElementById('grid').innerHTML=PRODS.map(p=>renderCard(p,(allData[p]||[]).find(e=>e.date===d),d)).join('');
  buildArc();
  buildWkTable();
  buildMiniWkTable();
}

// в”Җв”Җ лҚ°мқҙн„° лЎңл“ң в”Җв”Җ
async function loadData(){
  try{
    const res=await fetch(GAS+'?action=load');
    const json=await res.json();
    if(!json.success)throw new Error(json.message);
    allData=json.data; allDates=json.dates;
    buildArc();
    if(!curDate&&allDates.length>0)curDate=allDates[0];
    if(curDate)selDate(curDate);
    buildWkTable();
    buildMiniWkTable();
  }catch(e){toast('вқҢ лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ: '+e.message,'err');}
}

// в”Җв”Җ м№ҙл“ң л ҢлҚ” в”Җв”Җ
function renderCard(prod,entry,date){
  const cls=PCLS[prod];
  if(!entry)return `<div class="p-card">
    <div class="card-bar ${cls}"></div>
    <div class="card-hdr"><div class="card-prod ${cls}">${prod}</div></div>
    <div class="no-data">лҚ°мқҙн„° м—ҶмқҢ<br><button class="btn btn-primary" style="margin-top:12px;" onclick="openModal('${prod}','${date}')">+ мһ…л Ҙ</button></div>
  </div>`;
  const dir=entry.direction==='мғҒмҠ№'?'up':entry.direction==='н•ҳлқҪ'?'dn':'flt';
  const ps=entry.changePct>=0?'+':'';
  const as=entry.change!=null?(entry.change>=0?'+':'')+entry.change.toFixed(2)+' USD':'';
  return `<div class="p-card">

// в”Җв”Җ мЈјк°„ н…Ңмқҙлё” в”Җв”Җ
function fmtD(dt){
  return dt.getFullYear()+'.'+String(dt.getMonth()+1).padStart(2,'0')+'.'+String(dt.getDate()).padStart(2,'0');
}
function getISOWeek(dt){
  const d=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return 'W'+String(Math.ceil((((d-yearStart)/86400000)+1)/7)).padStart(2,'0');
}
function getWeekColumns(dateStr){
  const parts=dateStr.split('.');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const dow=d.getDay();
  const diffToFri=dow===6?6:(5-dow+7)%7;
  const fri=new Date(d); fri.setDate(d.getDate()+diffToFri);
  const prevFri=new Date(fri); prevFri.setDate(fri.getDate()-7);
  const cols=[];
  cols.push(fmtD(prevFri));
  const mon=new Date(prevFri); mon.setDate(prevFri.getDate()+3);
  for(let i=0;i<5;i++){
    const day=new Date(mon); day.setDate(mon.getDate()+i);
    cols.push(fmtD(day));
  }
  return {cols, weekLabel:getISOWeek(fri), from:fmtD(prevFri), to:fmtD(fri)};
}

// в”Җв”Җ API (GET л°©мӢқ) в”Җв”Җ
function toB64(obj){
  const str=JSON.stringify(obj);
  const arr=new TextEncoder().encode(str);
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';
  let b64='';
  for(let i=0;i<arr.length;i+=3){
    const a=arr[i],b=arr[i+1]??0,c=arr[i+2]??0;
    b64+=chars[a>>2]+chars[((a&3)<<4)|(b>>4)]+
      (i+1<arr.length?chars[((b&15)<<2)|(c>>6)]:'=')+
      (i+2<arr.length?chars[c&63]:'=');
  }
  return b64;
}
async function gasGet(params){
  const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const res=await fetch(GAS+'?'+qs);
  return res.json();
}
async function doSaveAll(){
  let count=0;
  for(const p of PRODS){
    const price=parseFloat(document.getElementById('f-price-'+p).value);
    const date=document.getElementById('f-date-'+p).value;
    if(!date||isNaN(price))continue;
    const isEdit=editMode.sheet===p;
    const data={
      date:fmtDate(date),price,
      change:(document.getElementById('f-change-'+p).value!==''?parseFloat(document.getElementById('f-change-'+p).value):null),
      changePct:parseFloat(document.getElementById('f-pct-'+p).value)||0,
      direction:document.getElementById('f-dir-'+p).value,
      commentary:document.getElementById('f-co-'+p).value.trim(),
      factors:document.getElementById('f-fa-'+p).value.trim(),
      outlook:document.getElementById('f-ou-'+p).value.trim()
    };
    const action=isEdit?'edit':'save';
    const payload={sheet:p,data,rowKey:isEdit?{date:editMode.date}:null};
    try{
      const r=await gasGet({action,p:toB64(payload)});
      if(r.success)count++;
      else toast('вқҢ '+p+': '+r.message,'err');
    }catch(e){toast('вқҢ '+p+' м ҖмһҘ мӢӨнҢЁ','err');}
  }
  if(count>0){toast('вң… '+count+'к°ң н’ҲлӘ© м ҖмһҘ мҷ„лЈҢ','ok');closeModal();loadData();}
}

}

// в”Җв”Җ нҢҢмӢұ в”Җв”Җ
// WTI / SM / BZ / BD кіөнҶө structured briefing нҢҢм„ң
function parseBriefing(txt, prod){
  const f={};

  txt=txt.replace(/\*\*/g,'');

  // лӮ м§ң м¶”м¶ң
  let dm=txt.match(/(\d{4})[\-.\/](\d{1,2})[\-.\/](\d{1,2})/);
  if(dm){
    f.dateStr=dm[1]+'-'+dm[2].padStart(2,'0')+'-'+dm[3].padStart(2,'0');
  }

  const lines=txt
    .split('\n')
    .map(l=>l.trim())
    .filter(l=>l.length>0);

  function normalizeSectionName(line){
    return line.replace(/\s+/g,'').replace(/[пјҡ:]/g,'');
  }

  function getSection(keyword){
    const keys=Array.isArray(keyword)?keyword:[keyword];
    const normalizedKeys=keys.map(k=>k.replace(/\s+/g,''));
    const si=lines.findIndex(l=>{
      const nl=normalizeSectionName(l);
      return normalizedKeys.some(k=>nl.includes(k));
    });
    if(si<0)return[];

    const stopWords=['к°ҖкІ©','мҪ”л©ҳн„°лҰ¬','ліҖлҸҷмҡ”мқё','ліҖл‘үмҡ”мқё','кІ°лЎ л°Ҹм „л§қ','кё°нғҖм¶”к°Җм •ліҙ','м „л¬ёк°ҖмҪ”л©ҳнҠё'];

    const result=[];
    for(let i=si+1;i<lines.length;i++){
      const nl=normalizeSectionName(lines[i]);
      if(/^\d+\./.test(lines[i]))break;
      if(stopWords.some(sw=>nl.includes(sw)))break;
      result.push(lines[i]);
    }
    return result;
  }

  function getBullets(sectionLines){
    return sectionLines
      .filter(l=>l.startsWith('*') || l.startsWith('вҖў') || l.startsWith('-'))
      .map(l=>l.replace(/^[*вҖў\-]\s*/,'').trim())
      .filter(l=>l.length>0);
  }

  function findPriceLine(sectionLines, prod){
    if(!sectionLines || sectionLines.length===0)return '';

    const patternsByProd={
      WTI:[/NYMEX/i,/WTI/i,/Crude/i],
      Styrene:[/CFR\s*China/i,/FOB\s*Korea/i,/Styrene/i],
      Benzene:[/FOB\s*Korea/i,/Benzene/i],
      Butadiene:[/CFR\s*China/i,/FOB\s*Korea/i,/Butadiene/i,/BD/i]
    };

    const pats=patternsByProd[prod]||[];
    for(const line of sectionLines){
      if(pats.some(re=>re.test(line)))return line;
    }
    return sectionLines[0] || '';
  }

  function parsePrice(line, prod){
    const r={};
    if(!line)return r;

    // к°ҖкІ©
    let pm=line.match(/\$([\d,]+(?:\.\d+)?)\s*\/\s*(mt|bbl|b)/i);
    if(pm){
      r.price=parseFloat(pm[1].replace(/,/g,''));
    }

    // м „мқјл№„
    let chgM=line.match(/м „мқј\s*лҢҖл№„\s*([+-])\s*\$?\s*([\d.]+)/);
    if(chgM){
      r.change=(chgM[1]==='-'?-1:1)*parseFloat(chgM[2]);
    }

    if(r.change==null){
      chgM=line.match(/м „мқј\s*лҢҖл№„\s*([+-]?)(\d+(?:\.\d+)?)(?:\s*USD)?(?:[,\s]|$)/i);
      if(chgM){
        const sign=chgM[1]==='-'?-1:1;
        r.change=sign*parseFloat(chgM[2]);
      }
    }

    // л°©н–Ҙ
    const dirM=line.match(/(мғҒмҠ№|н•ҳлқҪ|ліҙн•©)/);
    if(dirM){
      r.dir=dirM[1];
    }

    if(!r.dir && r.change!=null){
      r.dir=r.change===0?'ліҙн•©':r.change>0?'мғҒмҠ№':'н•ҳлқҪ';
    }

    if(r.price!=null && r.change!=null){
      const prev=r.price-r.change;
      if(prev!==0){
        r.pct=parseFloat(((r.change/prev)*100).toFixed(2));
      }else{
        r.pct=0;
      }
    }

    return r;
  }

  const sec1=getSection('к°ҖкІ©');
  const priceLine=findPriceLine(sec1,prod);
  Object.assign(f, parsePrice(priceLine, prod));

  if(!f.dir)f.dir=(f.change||0)===0?'ліҙн•©':(f.change||0)>0?'мғҒмҠ№':'н•ҳлқҪ';

  const b2=getBullets(getSection('мҪ”л©ҳн„°лҰ¬'));
  if(b2.length>0){
    f.commentary=b2[0];
  }else if(f.price!=null){
    const ps=(f.pct||0)>=0?'+':'';
    let marketLabel='';
    let unitLabel='';

    if(prod==='WTI'){
      marketLabel='(NYMEX)';
      unitLabel='л°°лҹҙлӢ№';
    }else if(prod==='Benzene'){
      marketLabel='(FOB Korea)';
      unitLabel='нҶӨлӢ№';
    }else if(prod==='Styrene'){
      marketLabel='(CFR China)';
      unitLabel='нҶӨлӢ№';
    }else if(prod==='Butadiene'){
      marketLabel='(CFR China)';
      unitLabel='нҶӨлӢ№';
    }

    f.commentary=`${prod}${marketLabel}лҠ” ${ps}${(f.pct||0).toFixed(2)}% ліҖлҸҷн•ҳм—¬ ${unitLabel} $${f.price.toFixed(2)}м—җ ${f.dir} л§Ҳк°җн–ҲлӢӨ.`;
  }

  let b3=getBullets(getSection(['ліҖлҸҷмҡ”мқё','ліҖл‘үмҡ”мқё']));
  if(b3.length>0)f.factors=b3.join('\n');

  const b4=getBullets(getSection('кІ°лЎ л°Ҹм „л§қ'));
  if(b4.length>0)f.outlook=b4[0];

  return f;
}

function doParse(){
  const p=activeTab,txt=(document.getElementById('ta-'+p)||{}).value?.trim();
  if(!txt){showSt(p,'warn','н…ҚмҠӨнҠё м—ҶмқҢ вҖ” мҲҳлҸҷ мһ…л Ҙ лӘЁл“ң');return;}

  const f=parseBriefing(txt,p);

  if(f.dateStr)document.getElementById(`f-date-${p}`).value=f.dateStr;
  const dir=f.dir||(((f.pct||0)>0)?'мғҒмҠ№':((f.pct||0)<0)?'н•ҳлқҪ':'ліҙн•©');
  document.getElementById(`f-dir-${p}`).value=dir;
  if(f.price!=null)document.getElementById(`f-price-${p}`).value=f.price.toFixed(2);
  if(f.change!=null)document.getElementById(`f-change-${p}`).value=f.change.toFixed(2);
  if(f.pct!=null)document.getElementById(`f-pct-${p}`).value=f.pct.toFixed(2);
  if(f.commentary)document.getElementById(`f-co-${p}`).value=f.commentary;
  if(f.factors)document.getElementById(`f-fa-${p}`).value=f.factors;
  if(f.outlook)document.getElementById(`f-ou-${p}`).value=f.outlook;

  tabDone[p]=true;updDots();
  const ok=f.price!=null && f.pct!=null;
  showSt(p,ok?'ok':'warn',ok
    ?`вң“ ${p} $${(f.price||0).toFixed(2)} (${(f.pct||0)>=0?'+':''}${(f.pct||0).toFixed(2)}%) ${dir}`
    :'мҲҳм№ҳ мқјл¶Җ нҢҢмӢұ мӢӨнҢЁ вҖ” мҲҳлҸҷ нҷ•мқё');
}
